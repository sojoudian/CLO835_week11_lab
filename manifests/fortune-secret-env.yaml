# Week 11 lab · Step 4 — inject a Secret value as an environment variable.
# Identical to the ConfigMap case, but uses secretKeyRef instead of
# configMapKeyRef. The env var API_KEY takes its value from the Secret
# 'fortune-secret' key 'api-key' (created imperatively in commands.sh).
# Kubernetes decodes the base64 Secret and exposes it as a plain env var.
apiVersion: v1
kind: Pod
metadata:
  name: fortune-secret-env
spec:
  containers:
    - image: luksa/fortune:env
      name: html-generator
      env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: fortune-secret
              key: api-key
